name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx turbo run typecheck

      # Lint surfaces pre-existing issues (~105 errors, ~148 warnings as of PR2)
      # that accumulated before lint was part of CI. Don't block PR2 on cleanup;
      # tighten this to a hard gate after a dedicated lint-cleanup PR lands.
      - name: Lint
        run: npx turbo run lint
        continue-on-error: true

      - name: Test
        run: npx turbo run test

      - name: Build
        run: npx turbo run build
